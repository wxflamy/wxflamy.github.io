		<script type="text/javascript">
			const container = document.querySelector('#container');
			const container2 = document.querySelector('#container2');
			
			// VTK renderWindow/renderer
			const renderWindow = vtk.Rendering.Core.vtkRenderWindow.newInstance();
			const renderer = vtk.Rendering.Core.vtkRenderer.newInstance();
			renderWindow.addRenderer(renderer);
			const renderWindow2 = vtk.Rendering.Core.vtkRenderWindow.newInstance();
			const renderer2 = vtk.Rendering.Core.vtkRenderer.newInstance();
			renderWindow2.addRenderer(renderer2);
			
			//WebGL/OpenGL impl
			const openGLRenderWindow = vtk.Rendering.OpenGL.vtkRenderWindow.newInstance();
			openGLRenderWindow.setContainer(container);
			openGLRenderWindow.setSize(1000,1000);
			renderWindow.addView(openGLRenderWindow);
			
			const openGLRenderWindow2 = vtk.Rendering.OpenGL.vtkRenderWindow.newInstance();
			openGLRenderWindow2.setContainer(container2);
			openGLRenderWindow2.setSize(1000,1000);
			renderWindow2.addView(openGLRenderWindow2);
			
			// Interactor
			const interactor = vtk.Rendering.Core.vtkRenderWindowInteractor.newInstance();
			interactor.setView(openGLRenderWindow);
			interactor.initialize();
			interactor.bindEvents(container);
			
			// Interactor style
			const trackball = vtk.Interaction.Style.vtkInteractorStyleTrackballCamera.newInstance();
			interactor.setInteractorStyle(trackball);
			
			// Pipeline
			const cone = vtk.Filters.Sources.vtkConeSource.newInstance();
			const mapper = vtk.Rendering.Core.vtkMapper.newInstance();
			const actor = vtk.Rendering.Core.vtkActor.newInstance();
			
			mapper.setInputConnection(cone.getOutputPort());
			actor.setMapper(mapper);
			renderer.addActor(actor);
			renderer2.addActor(actor);
			
			// Render
			renderer.resetCamera();
			renderWindow.render();
			renderer2.resetCamera();
			renderWindow2.render();
		</script>
	</body>
